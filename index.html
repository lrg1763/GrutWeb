<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0d0d0f;
      --text: #f5f5f0;
      --accent: #e8c547;
    }

    html, body {
      min-height: 100vh;
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(232, 197, 71, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(232, 197, 71, 0.05) 0%, transparent 40%);
      pointer-events: none;
    }

    .heading {
      font-size: clamp(3rem, 15vw, 12rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.95;
      text-align: center;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      animation: fadeUp 1s ease-out;
    }

    .heading span {
      display: block;
      background: linear-gradient(180deg, var(--text) 0%, rgba(245, 245, 240, 0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      margin-top: 1rem;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.9;
      animation: fadeUp 1s ease-out 0.2s both;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="heading"><span>Coming Soon</span></h1>
    <p class="sub">We're working on something new</p>
  </main>
</body>
</html>
